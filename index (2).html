<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Yemni Service</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;background:#f0f4fb;display:flex;justify-content:center;padding:30px 20px;min-height:100vh}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);width:300px;height:fit-content;overflow:hidden}
.header{background:#1a3a6b;padding:16px;text-align:center}
.header .ar{font-size:16px;font-weight:bold;color:#fff}
.header .en{font-size:11px;color:#a8c4e8;letter-spacing:1px}
.service{background:#eef2fb;text-align:center;padding:10px;border-bottom:3px solid #e8a020}
.service .ar{font-size:20px;font-weight:bold;color:#1a3a6b}
.service .en{font-size:10px;color:#1a3a6b;opacity:.7;letter-spacing:2px}
.body{padding:16px}
.section-title{font-size:11px;color:#999;text-align:center;margin-bottom:10px;letter-spacing:1px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;margin-bottom:5px}
.row:nth-child(odd){background:#f7f9fc}
.row:nth-child(even){background:#eef2f9}
.day{font-size:13px;font-weight:bold;color:#1a3a6b}
.time{font-size:13px;font-weight:600;color:#444;direction:ltr}
.note{background:#fff8e6;border:1px solid #f5d98b;border-radius:10px;padding:10px;text-align:center;font-size:12px;color:#7a5500;margin:12px 0;line-height:1.7}
.divider{border:none;border-top:1px solid #eee;margin:12px 0}
.booking{text-align:center;padding-bottom:4px}
.booking-label{font-size:12px;color:#888;margin-bottom:6px}
.phone{font-size:26px;font-weight:bold;color:#1a3a6b;direction:ltr;letter-spacing:3px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="ar">شركة اليمني للسيارات</div>
    <div class="en">ALYEMNI MOTORS CO.</div>
  </div>
  <div class="service">
    <div class="ar">الصيانة</div>
    <div class="en">SERVICE</div>
  </div>
  <div class="body">
    <p class="section-title">⏰ أوقات العمل</p>
    <div class="row">
      <span class="day">السبت – الأربعاء</span>
      <span class="time">8:00ص – 4:00م</span>
    </div>
    <div class="row">
      <span class="day">الخميس</span>
      <span class="time">8:00ص – 2:00م</span>
    </div>
    <div class="note">
      🔧 الصيانة الدورية<br>
      <strong>بدون حجز مسبق</strong>
    </div>
    <hr class="divider">
    <div class="booking">
      <div class="booking-label">📅 لحجز المواعيد</div>
      <div class="phone">0555 630 248</div>
    </div>
  </div>
</div>
</body>
</html>
